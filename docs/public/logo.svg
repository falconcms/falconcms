<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <defs>
    <linearGradient id="ig" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2bbfff"/>
      <stop offset="1" stop-color="#0052c8"/>
    </linearGradient>
  </defs>

  <!-- Icon mark -->
  <g transform="translate(0,8)">
    <rect width="40" height="40" rx="9" fill="url(#ig)"/>
    <rect width="40" height="20" rx="9" fill="white" fill-opacity="0.07"/>
    <!-- Left column: 3 stacked blocks -->
    <rect x="6"    y="5.6"  width="10.8" height="7.2" rx="2"   fill="white" fill-opacity="0.95"/>
    <rect x="6"    y="14.4" width="10.8" height="7.2" rx="2"   fill="white" fill-opacity="0.72"/>
    <rect x="6"    y="23.2" width="10.8" height="7.2" rx="2"   fill="white" fill-opacity="0.95"/>
    <!-- Bottom row -->
    <rect x="18.4" y="23.2" width="7.2"  height="7.2" rx="2"   fill="white" fill-opacity="0.95"/>
    <rect x="27.2" y="23.2" width="6.8"  height="7.2" rx="2"   fill="white" fill-opacity="0.50"/>
    <!-- Ghost block -->
    <rect x="18.4" y="5.6"  width="15.6" height="16"  rx="2"
          fill="white" fill-opacity="0.07"
          stroke="white" stroke-opacity="0.25" stroke-width="0.7" stroke-dasharray="1.8 1.3"/>
    <!-- Drag dots -->
    <circle cx="9.6"  cy="18" r="0.9" fill="white" fill-opacity="0.4"/>
    <circle cx="13"   cy="18" r="0.9" fill="white" fill-opacity="0.4"/>
    <circle cx="16.4" cy="18" r="0.9" fill="white" fill-opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="52" y="34"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="23">
    <tspan font-weight="800" fill="#0091ea" letter-spacing="-0.5">Lazy</tspan><tspan font-weight="300" fill="#1d2327"> CMS</tspan>
  </text>
  <text x="53" y="47"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="600" fill="#94a3b8" letter-spacing="3.2">BUILDER</text>
</svg>
