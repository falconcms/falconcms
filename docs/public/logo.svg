<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2bbfff"/>
      <stop offset="1" stop-color="#0052c8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle top highlight -->
  <rect width="100" height="48" rx="22" fill="white" fill-opacity="0.07"/>

  <!-- Left column: 3 stacked blocks forming the stem of "L" -->
  <rect x="15" y="14" width="27" height="18" rx="5" fill="white" fill-opacity="0.95"/>
  <rect x="15" y="36" width="27" height="18" rx="5" fill="white" fill-opacity="0.72"/>
  <rect x="15" y="58" width="27" height="18" rx="5" fill="white" fill-opacity="0.95"/>

  <!-- Bottom row extending right: base of "L" -->
  <rect x="46" y="58" width="18" height="18" rx="5" fill="white" fill-opacity="0.95"/>
  <rect x="68" y="58" width="17" height="18" rx="5" fill="white" fill-opacity="0.50"/>

  <!-- Top-right ghost block: empty canvas area (builder placeholder) -->
  <rect x="46" y="14" width="39" height="40" rx="5"
        fill="white" fill-opacity="0.07"
        stroke="white" stroke-opacity="0.22" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Drag-handle dots on middle block (builder interaction hint) -->
  <circle cx="24" cy="45" r="1.8" fill="white" fill-opacity="0.38"/>
  <circle cx="31" cy="45" r="1.8" fill="white" fill-opacity="0.38"/>
  <circle cx="38" cy="45" r="1.8" fill="white" fill-opacity="0.38"/>

  <!-- Selection ring on top block -->
  <rect x="15" y="14" width="27" height="18" rx="5"
        fill="none" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
</svg>
